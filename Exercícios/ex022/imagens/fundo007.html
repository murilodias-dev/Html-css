<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralização Vertical</title>

    <Style> 

        *{ 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
        }
    
        body{
            height: 100vh; 
            background: white;
        } 

        section#fora{ 
            position: relative;
            height: 800px;  
            width: 100%;
            padding: 10px; 
            
            background-color: rgb(148, 24, 142);  
            
            
        } 

        article.dentro{ 
            position: absolute;
            width: 300px; 
            height: 200px; 
            
            border-color: black; 
            border-width: 2px;
            border-style: solid; 
            
            left: 300px; 
            top: 300px;
        } 
        
        article#d1{ 
            background-color: rgb(255, 255, 0);  
            left: 50%; 
            top: 50%; 

            transform: translate(-50%, -50%);
        }

        article#d2{ 
            background-color: rgb(0, 255, 255); 
            left: 0px; 
            top: 0px;
        } 

        article#d3{ 
            background-color: rgb(255, 0, 255); 
            left: 100%; 
            top: 100%; 

            transform: translate(-100%, -100%);
        }

    </Style>
</head>
<body>
    <section id="fora">
        <article class="dentro" id="d1"></article> 
        <article class="dentro" id="d2"></article> 
        <article class="dentro" id="d3"></article>
    </section>
</body>
</html>

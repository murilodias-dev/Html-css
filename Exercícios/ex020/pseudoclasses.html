<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
<style>
div{ 
    display: inline-block;
    background-color: black; 
    text-align: center;  
    border: 2px solid goldenrod;
    height: 200px;
    width: 200px;
}

#d1:hover{
  background-color: blue;   
  color: white;
}

#d2:hover{
    background-color: yellow;
}

#d3:hover{
    background-color: greenyellow;
}

#d4:hover{
    background-color: red;
}

#d4 > p { 
    display: none; 
    
}

#d4:hover > p {
    display: block; 
    color: white;  
    
}

</style>
</head> 
<body>

<div id="d1">01</div>
<div id="d2">02</div>
<div id="d3">03</div> 
<div id="d4">04 
    <p>TEXTO ESCONDIDO</p>
</div> 


</body>
</html>

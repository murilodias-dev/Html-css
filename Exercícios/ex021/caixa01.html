<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title> 
    <style>
        h1{ 
            background-color: rgba(119, 136, 153, 0.555);
            height: 300px;
            width: 300px; 
            border-width: 10px; 
            border-style: solid; 
            border-color: rgba(40, 56, 38, 0.712); 

            padding: 10px;
            margin: 10px auto; 
            outline: 5px dashed salmon;
        } 

        a{ 
            border-width: 10px; 
            border-style: solid; 
            border-color: red;
        } 
    </style>
</head>
<body>
    <h1>Exemplode caixa box-level</h1> 
    <p>Parágrafos também são exemplos de box-level, mas os <a href="@"> links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona</p>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantas letras tem seu nome?</title>
    <style>

body{

    font: normal 20pt Arial;
}

    </style>
</head>
<body>
     <script> 
var nome = window.prompt('Qual é seu nome?') 

if (nome === '') {
    nome = 'Desconhecido'  
} 



document.write(`Olá, ${nome}! Seu nome tem ${nome.replace(' ', '').length} letras.`)



     </script>
</body>
</html>

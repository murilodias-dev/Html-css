<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID-BR</title>
</head> 

<body>
    <h1> Identificador de Nacionalidade</h1> 
   
    Defina sua Nacionalidade: <input type="number" name="txtvel" id="txtvel"> 
    <input type="button" value= "Verificar" onclick="identificador()">  
    <div id="res"> 
    <p>1- <strong>Brasileiro</strong></p> 
    <p>2- <strong>Italiano</strong></p>
    <p>3- <strong>Frances</strong></p>
    <p>4- <strong>Dinamarques</strong></p> 
    <p>5-<strong> Arabe</strong></p>
<script>
     

  function identificador(){
        
    var txtv = window.document.getElementById('txtvel')  
        
    var res = window.document.querySelector('div#res') 
        
    var pais = Number(txtv.value)  
       
    res.innerHTML = `<p>Você selecionou <strong>${pais}</strong></p>`
        if (pais == 1) {
           res.innerHTML += `<p>Você é <Strong>Brazuca</Strong> bem vindo ${pais}!</p>` 
        }
        if(pais >=6 != 1){
           
           res.innerHTML += `<p>Você é <Strong>Gringo</Strong> bem vindo ${pais}!</p>`
        } 
        else{

        window.alert(`O numero ${pais} não exite.`)

        }    
    }

</script>

</body>
</html>
